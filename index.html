<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Odin Project | Rock Paper Scissors</title>
  </head>
  <body>
    <script>
      // this function will generate a choice for the computer
      function getComputerChoice() {
        // this will generate random number from 0 to 2
        let randomNumber = Math.floor(Math.random() * 3);

        // converts randomNumber into a choice then return it and if not valid, return null
        if (randomNumber === 0) return "rock";
        else if (randomNumber === 1) return "paper";
        else if (randomNumber === 2) return "scissors";
        else return null;
      }

      // this function will open a prompt for user choice
      function getHumanChoice() {
        // ask for input first
        let userInput = prompt("Enter rock, paper, or scissors: ");

        // checks if userInput exists
        if (!userInput) return null;

        //set the choice to lowercase for case sensitivity
        let humanChoice = userInput.toLowerCase();

        // This loop ONLY triggers if the input above was bad
        while (
          humanChoice !== "rock" &&
          humanChoice !== "paper" &&
          humanChoice !== "scissors"
        ) {
          console.log("Invalid choice! Please try again.");
          userInput = prompt("Enter rock, paper, or scissors: ");
          if (!userInput) return null;
          humanChoice = userInput.toLowerCase();
        }

        return humanChoice;
      }

      //This function is for the game loop
      function playGame() {
        // this are the scores initially
        let humanScore = 0;
        let computerScore = 0;

        // this function is for the round logic
        function playRound(humanChoice, computerChoice) {
          // logs human and computer choice
          console.log(`Player: ${humanChoice} | Computer: ${computerChoice}`);

          // this is for the main logic of the game for every winning scenarios then adds score for who wins
          if (humanChoice === computerChoice) {
            console.log("It's a tie! Both chose " + humanChoice);
          } else if (humanChoice === "rock" && computerChoice === "scissors") {
            console.log("You win! Rock beats Scissors.");
            humanScore += 1;
          } else if (humanChoice === "paper" && computerChoice === "rock") {
            console.log("You win! Paper beats Rock.");
            humanScore += 1;
          } else if (humanChoice === "scissors" && computerChoice === "paper") {
            console.log("You win! Scissors beats Paper.");
            humanScore += 1;
          } else {
            // If it is not a tie and human didn't win, computer must win
            console.log(
              "You lose! " + computerChoice + " beats " + humanChoice,
            );
            computerScore += 1;
          }

          console.log(
            `Scores -> Player: ${humanScore} | Computer: ${computerScore}`,
          );
        }

        // plays game for 5 round
        for (let i = 1; i <= 5; i++) {
          // calls the function for choices
          let computerChoice = getComputerChoice();
          let humanChoice = getHumanChoice();

          // break the loop if humanChoice is null
          if (!humanChoice) {
            console.log("Your choice is invalid!");
            return;
          }

          // logs round number
          console.log("Round " + i);
          playRound(humanChoice, computerChoice);
        }

        // Final tournament winner announcement
        console.log("=== FINAL TOURNAMENT RESULT ===");
        console.log(
          `Final Scores -> Player: ${humanScore} | Computer: ${computerScore}`,
        );

        if (humanScore > computerScore)
          console.log("Congratulations! You won the match!");
        else if (computerScore > humanScore)
          console.log("Game Over! The computer wins the match.");
        else console.log("The match ends in a total draw!");
      }

      playGame();
    </script>
  </body>
</html>
